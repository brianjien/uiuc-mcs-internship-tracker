[package]
name = "brianjien/uiuc-mcs-internship-tracker"
version = "0.2.0"
description = "Full-stack UIUC MCS internship and new grad tracker for Wasmer Edge"
entrypoint = "script"

[dependencies]
"wasmer/edgejs" = "0.0.1"

[fs]
"/app/dist" = "./dist"
"/app/server-dist" = "./server-dist"

[[command]]
name = "script"
module = "wasmer/edgejs:edgejs"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
main-args = ["/app/server-dist/http.mjs"]
env = ["NODE_ENV=production", "PORT=8080"]
